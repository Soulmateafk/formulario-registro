<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Operaciones</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    form {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 600px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    h2 {
      grid-column: span 2;
      text-align: center;
      margin-bottom: 10px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    button {
      grid-column: span 2;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #45a049;
    }
    small {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <form id="registroForm">
    <h2>Registro de Operaciones</h2>

    <div>
      <label>Hora de radicación:</label>
      <input type="time" name="hora_radicacion" required>
    </div>

    <div>
      <label>Hora de ingreso a muelle:</label>
      <input type="time" name="hora_ingreso" required>
    </div>

    <div>
      <label>Hora de salida de muelle:</label>
      <input type="time" name="hora_salida" required>
    </div>

    <div>
      <label>Hora de facturación:</label>
      <input type="time" name="hora_facturacion" required>
    </div>

    <div>
      <label>Producto de devolución:</label>
      <input type="text" name="producto_devolucion" required>
    </div>

    <div>
      <label>Cantidad de devolución:</label>
      <input type="number" name="cantidad_devolucion" min="1" required>
    </div>

    <div>
      <label>Motivo devolución:</label>
      <textarea name="motivo_devolucion" required></textarea>
    </div>

    <div>
      <label>Placa:</label>
      <input type="text" name="placa" pattern="[A-Za-z]{3}[0-9]{3}" required>
      <small>Formato: ABC123</small>
    </div>

    <button type="submit">Guardar</button>
  </form>

  <script>
    document.getElementById("registroForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      if (!this.checkValidity()) {
        alert("Por favor completa todos los campos correctamente.");
        return;
      }
      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());

      // Añadir fecha y hora automática del envío
      const ahora = new Date();
      data.fecha_envio = ahora.toLocaleDateString();
      data.hora_envio = ahora.toLocaleTimeString();

      await fetch("https://script.google.com/macros/s/AKfycbz54I5mNN-iJacYWL9FRMqo9Ep422xj9hsiDc4765gdO6Ci6Tzs2nVkC-pjki0R8FmB/exec", {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    });

      alert("Registro guardado en Google Sheets");
      this.reset();
    });
  </script>
</body>
</html>
