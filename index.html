<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Operaciones</title>
  <style>
    :root {
      --primary-color: #5e35b1; /* Tono morado corporativo */
      --primary-hover: #4527a0;
      --bg-color: #f4f3f9;
      --text-color: #333;
      --border-color: #ccc;
    }
    
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    form {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 650px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
      border-top: 6px solid var(--primary-color);
    }

    h2 {
      grid-column: 1 / -1;
      text-align: center;
      margin-top: 0;
      margin-bottom: 10px;
      color: var(--primary-color);
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-group.cliente-group {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 14px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 15px;
      transition: border-color 0.3s, box-shadow 0.3s;
      background-color: #fff;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(94, 53, 177, 0.15);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      grid-column: 1 / -1;
      padding: 14px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.3s;
      margin-top: 10px;
    }

    button:hover {
      background: var(--primary-hover);
    }

    small {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    @media (max-width: 600px) {
      form {
        grid-template-columns: 1fr;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <form id="registroForm">
    <h2>Registro de Operaciones</h2>

    <div class="form-group cliente-group">
      <label>Cliente:</label>
      <select name="cliente" required>
        <option value="" disabled selected>Seleccione un cliente...</option>
        <!-- Puedes duplicar esta línea para añadir más clientes si lo requieres -->
        <option value="Cliente 1">Exito Cali</option>
        <option value="Cliente 2">D1 Cali</option>
        <option value="Cliente 3">D1 Eje Cafetero</option>
        <option value="Cliente 4">Exito Medellin</option>
        <option value="Cliente 5">D1 Girardota</option>
        <option value="Cliente 6">D1 Guarne</option>
        <option value="Cliente 7">D1 La Estrella</option>
        <option value="Cliente 8">Ara Barranquilla</option>
        <option value="Cliente 9">D1 Barranquilla</option>
        <option value="Cliente 10">Exito Barranquilla</option>
        <option value="Cliente 11">Ara Monteria</option>
        <option value="Cliente 12">D1 Monteria</option>
        <option value="Cliente 13">Ara Valledupar</option>
        <option value="Cliente 14">D1 Ibague</option>  
        <option value="Cliente 15">Ara Cartagena</option>
      </select>
    </div>

    <div class="form-group">
      <label>Hora de radicación:</label>
      <input type="time" name="hora_radicacion" required>
    </div>

    <div class="form-group">
      <label>Hora de ingreso a muelle:</label>
      <input type="time" name="hora_ingreso" required>
    </div>

    <div class="form-group">
      <label>Hora de salida de muelle:</label>
      <input type="time" name="hora_salida" required>
    </div>

    <div class="form-group">
      <label>Hora de facturación:</label>
      <input type="time" name="hora_facturacion" required>
    </div>

    <div class="form-group">
      <label>Placa del vehículo:</label>
      <input type="text" name="placa" pattern="[A-Za-z]{3}[0-9]{3}" required>
      <small>Formato: ABC123</small>
    </div>

    <div class="form-group">
      <label>Producto de devolución:</label>
      <input type="text" name="producto_devolucion" required>
    </div>

    <div class="form-group">
      <label>Cantidad total de devolución:</label>
      <input type="number" name="cantidad_devolucion" min="1" required>
      <small>Solo valores numéricos</small>
    </div>

    <div class="form-group">
      <label>Unidad de medida base:</label>
      <select name="unidad_medida_base" required>
        <option value="" disabled selected>Seleccione una unidad...</option>
        <option value="unidad">Unidad</option>
        <option value="canastilla">Canastilla</option>
        <option value="caja">Caja</option>
        <option value="otro">otro</option>
      </select>
    </div>

    <div class="form-group full-width">
      <label>Motivo devolución:</label>
      <textarea name="motivo_devolucion" required></textarea>
    </div>

    <button type="submit">Guardar Registro</button>
  </form>

  <script>
    document.getElementById("registroForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      
      if (!this.checkValidity()) {
        alert("Por favor completa todos los campos correctamente.");
        return;
      }
      
      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());

      const ahora = new Date();
      data.fecha_envio = ahora.toLocaleDateString();
      data.hora_envio = ahora.toLocaleTimeString();

      const btnSubmit = this.querySelector('button[type="submit"]');
      btnSubmit.disabled = true;
      btnSubmit.innerText = "Guardando...";

      try {
        await fetch("https://script.google.com/macros/s/AKfycbz54I5mNN-iJacYWL9FRMqo9Ep422xj9hsiDc4765gdO6Ci6Tzs2nVkC-pjki0R8FmB/exec", {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(data)
        });

        alert("Registro guardado en Google Sheets con éxito.");
        this.reset();
      } catch (error) {
        alert("Ocurrió un error al guardar. Intenta nuevamente.");
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.innerText = "Guardar Registro";
      }
    });
  </script>
</body>
</html>
